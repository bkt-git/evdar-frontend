<!DOCTYPE html>
<html>

<head>
    <title>EVDAR | Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="login-bg">
        <!-- Cosmic Background Elements (Injected via JS) -->


        <form onsubmit="login(event)" class="login-box">
            <!-- Placeholder for circular logo -->
            <div class="sidebar-logo" style="margin: 0 auto 20px auto;">Logo</div>
            <h2>EVDAR</h2>

            <input id="username" placeholder="Username" required>
            <input id="password" type="password" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>
    </div>

    <script src="login.js"></script>
</body>

</html>
