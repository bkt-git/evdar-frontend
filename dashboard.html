<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVDAR | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>

<body>

    <div class="dashboard-container">
        <!-- SIDEBAR -->
        <nav class="sidebar">
            <div class="sidebar-brand">
                <!-- Placeholder for circular logo -->
                <div class="sidebar-logo">Logo</div>
                <h2>EVDAR</h2>
            </div>
            <ul>
                <li><a onclick="renderView('overview')" class="active"><span class="icon">📊</span><span
                            class="text">Overview</span></a></li>
                <li><a onclick="renderView('vehicle')"><span class="icon">🚗</span><span class="text">Vehicle
                            Live</span></a></li>
                <li class="admin-link" style="display:none"><a onclick="renderView('admin')"><span
                            class="icon">🔒</span><span class="text">Admin</span></a></li>
                <li><a onclick="renderView('help')"><span class="icon">❓</span><span class="text">Help</span></a></li>
                <li><a onclick="renderView('contact')"><span class="icon">📞</span><span class="text">Contact
                            Us</span></a></li>
                <li><a onclick="renderView('about')"><span class="icon">ℹ️</span><span class="text">About</span></a>
                </li>
            </ul>
            <ul style="flex-grow:0; margin-top:auto">
                <li><a onclick="logout()"><span class="icon">🚪</span><span class="text">Logout</span></a></li>
            </ul>
        </nav>

        <!-- MAIN CONTENT -->
        <main class="main-content" id="mainContent">

            <!-- HEADER (Shared) -->
            <header>
                <h2 id="welcome" style="margin:0">Welcome</h2>
                <!-- Additional header tools could go here -->
            </header>

            <!-- VIEW: OVERVIEW (Default) -->
            <div id="view-overview" class="view-section active">
                <!-- Content cleared as requested -->
            </div>

            <!-- VIEW: GENERIC (Used for other pages) -->
            <div id="view-generic" class="view-section">
                <!-- Dynamic content injected here -->
            </div>

        </main>
    </div>

    <!-- Scripts -->
    <script src="dashboard_logic.js"></script>
    <script src="script.js"></script>

</body>

</html>
